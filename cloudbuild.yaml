steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BUILD_NUMBER=$$(git rev-list --count HEAD)
        docker build \
          --build-arg BUILD_NUMBER=$$BUILD_NUMBER \
          --build-arg VITE_FIREBASE_API_KEY=${_FIREBASE_API_KEY} \
          --build-arg VITE_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN} \
          --build-arg VITE_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID} \
          -t gcr.io/$PROJECT_ID/homework-planner:${SHORT_SHA} \
          -t gcr.io/$PROJECT_ID/homework-planner:latest \
          .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/homework-planner']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - run
      - deploy
      - homework-planner
      - --image=gcr.io/$PROJECT_ID/homework-planner:${SHORT_SHA}
      - --region=us-central1
      - --allow-unauthenticated
